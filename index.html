<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Shiva History Dashboard</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="eyebrow">ESPN Fantasy Football</p>
      <h1>The Shiva History Dashboard</h1>
      <p class="subtitle">All-time stats, season-by-season results, and league scoring history.</p>
    </div>
  </header>

  <main class="dashboard">
    <section class="panel trophy-panel">
      <div class="panel-header">
        <div>
          <p class="panel-kicker">Legacy</p>
          <h2>All-Time Standings</h2>
        </div>
      </div>
      <div id="allTimeStandings">Loading...</div>
    </section>

    <section class="panel cowboys-panel">
      <div class="panel-header">
        <div>
          <p class="panel-kicker">Season View</p>
          <h2>Yearly Standings</h2>
        </div>
        <div class="select-wrap">
          <label for="yearSelect">Season</label>
          <select id="yearSelect"></select>
        </div>
      </div>
      <div id="yearStandings">Loading...</div>
    </section>

    <section class="panel chart-panel">
      <div class="panel-header">
        <div>
          <p class="panel-kicker">Scoring History</p>
          <h2>All-Time Points For</h2>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="allTimeChart"></canvas>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
