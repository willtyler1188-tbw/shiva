<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League History Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>League History Dashboard</h1>
    <p>All-time stats, yearly standings, and league history.</p>
  </header>

  <main>
    <section class="card">
      <h2>All-Time Standings</h2>
      <div id="allTimeStandings">Loading...</div>
    </section>

    <section class="card">
      <h2>All-Time Points Chart</h2>
      <canvas id="allTimeChart"></canvas>
    </section>

    <section class="card">
      <h2>Yearly Standings</h2>
      <label for="yearSelect">Choose a season:</label>
      <select id="yearSelect"></select>
      <div id="yearStandings">Loading...</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
